<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stack — Library Tracker</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b2733">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stack">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap');

  :root{
    --ink: #1b2733;
    --ink-2: #263341;
    --card: #ede6d6;
    --card-line: #d8cdb4;
    --brass: #b08d57;
    --brass-bright: #d4ac6e;
    --red-stamp: #8c2f2f;
    --green-ok: #4a6b52;
    --amber: #a67a2e;
    --text-dark: #2a2620;
    --text-muted: #6b6255;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 0%, #223142 0%, transparent 45%),
      var(--ink);
    font-family: 'Courier Prime', monospace;
    color: var(--card);
    padding: 40px 20px 80px;
  }

  .wrap{ max-width: 760px; margin: 0 auto; }

  header{ margin-bottom: 32px; }
  .finished-counter{
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--brass-bright);
    border: 1px solid #3a4c62;
    border-radius: 20px;
    padding: 4px 12px;
  }
  .calendar-status{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn-calendar{
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid var(--brass);
    color: var(--brass-bright);
    font-family: 'Courier Prime', monospace;
  }
  .btn-calendar:hover{ background: rgba(176,141,87,0.12); }
  .btn-calendar.connected{
    background: var(--green-ok);
    border-color: var(--green-ok);
    color: #f4efe2;
  }
  .calendar-note{
    font-size: 10.5px;
    color: #8fa0b3;
  }
  .eyebrow{
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--brass-bright);
    margin: 0 0 6px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 40px;
    margin: 0;
    color: #f4efe2;
    letter-spacing: -0.5px;
  }
  .sub{
    font-size: 13px;
    color: #8fa0b3;
    margin: 8px 0 0;
    line-height: 1.5;
  }

  /* Next-up hero */
  .next-up{
    background: var(--card);
    color: var(--text-dark);
    border-radius: 3px;
    padding: 22px 24px;
    margin: 28px 0 34px;
    position: relative;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    border-left: 6px solid var(--brass);
  }
  .next-up .tag{
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--brass);
    font-weight: 700;
  }
  .next-up h2{
    font-family: 'Fraunces', serif;
    font-size: 26px;
    margin: 6px 0 2px;
    font-weight: 600;
  }
  .next-up .author{ color: var(--text-muted); font-size: 13px; }
  .next-up .due-line{ margin-top: 10px; font-size: 12px; }
  .next-up .up-next-line{
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--card-line);
    font-size: 11.5px;
    color: var(--text-muted);
  }
  .next-up .up-next-line strong{ color: var(--text-dark); }
  .empty-hero{
    background: var(--card);
    color: var(--text-muted);
    border-radius: 3px;
    padding: 22px 24px;
    margin: 28px 0 34px;
    font-size: 13px;
    text-align: center;
    border-left: 6px solid var(--card-line);
  }

  /* Currently reading shelf */
  .reading-shelf-label{
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8fa0b3;
    margin: 0 0 10px;
  }
  .reading-shelf{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
  }
  .reading-tile{
    background: var(--card);
    color: var(--text-dark);
    border-radius: 3px;
    padding: 10px 12px;
    width: 150px;
    border-top: 4px solid var(--brass);
    position: relative;
  }
  .reading-tile .tile-title{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13px;
    line-height: 1.25;
    margin: 0 0 3px;
  }
  .reading-tile .tile-author{
    font-size: 10.5px;
    color: var(--text-muted);
    margin: 0 0 6px;
  }
  .reading-tile .tile-due{
    font-size: 10px;
    color: var(--text-muted);
    margin: 0 0 8px;
  }
  .reading-tile .tile-stop{
    font-size: 9.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 2px;
    background: transparent;
    border: 1px solid var(--card-line);
    color: var(--text-muted);
    width: 100%;
  }
  .reading-tile .tile-stop:hover{ border-color: var(--red-stamp); color: var(--red-stamp); }
  .reading-shelf-empty{
    font-size: 12px;
    color: #8fa0b3;
    margin-bottom: 30px;
  }

  .return-shelf-label{
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8fa0b3;
    margin: 0 0 10px;
  }
  .return-shelf{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
  }
  .return-tile{
    background: var(--card);
    color: var(--text-dark);
    border-radius: 3px;
    padding: 10px 12px;
    width: 150px;
    border-top: 4px solid var(--green-ok);
  }
  .return-tile .tile-title{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13px;
    line-height: 1.25;
    margin: 0 0 3px;
  }
  .return-tile .tile-author{
    font-size: 10.5px;
    color: var(--text-muted);
    margin: 0 0 3px;
  }
  .return-tile .tile-finished{
    font-size: 10px;
    color: var(--text-muted);
    margin: 0 0 8px;
  }
  .return-tile .tile-returned-btn{
    font-size: 9.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 2px;
    background: var(--green-ok);
    border: none;
    color: #f4efe2;
    width: 100%;
  }
  .return-tile .tile-returned-btn:hover{ background: #3d5a44; }

  /* To-read wishlist */
  .wishlist-label{
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8fa0b3;
    margin: 24px 0 10px;
  }
  .quick-add{
    background: var(--ink-2);
    border: 1px solid #34455a;
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .quick-add-row{
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr auto;
    gap: 8px;
  }
  .quick-add-row input{
    background: #16202c;
    border: 1px solid #3a4c62;
    color: #f4efe2;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 3px;
    width: 100%;
  }
  .quick-add-row input:focus{ outline: 2px solid var(--brass-bright); outline-offset: 1px; }
  .quick-add-row button{
    background: var(--brass);
    color: var(--ink);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .quick-add-row button:hover{ background: var(--brass-bright); }

  .wishlist-row{
    background: var(--card);
    color: var(--text-dark);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 8px;
    border-left: 4px dashed var(--brass);
  }
  .wishlist-row-top{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  .wl-title{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    margin: 0 0 2px;
  }
  .wl-meta{ font-size: 11.5px; color: var(--text-muted); margin: 0; }
  .wl-actions{ display: flex; gap: 6px; flex-shrink: 0; }
  .borrow-inline{
    display: none;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--card-line);
    flex-wrap: wrap;
  }
  .borrow-inline.open{ display: flex; }
  .borrow-inline input[type=date]{
    background: #16202c;
    border: 1px solid #3a4c62;
    color: #f4efe2;
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 3px;
  }
  .borrow-inline label{
    font-size: 11.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .borrow-inline button{
    background: var(--green-ok);
    color: #f4efe2;
    font-size: 11px;
    padding: 7px 10px;
    border-radius: 3px;
  }
  .wishlist-empty{
    font-size: 12px;
    color: #8fa0b3;
    margin-bottom: 20px;
  }

  /* Add form */
  .add-form{
    background: var(--ink-2);
    border: 1px solid #34455a;
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 34px;
  }
  .add-form h3{
    font-family: 'Fraunces', serif;
    font-size: 15px;
    margin: 0 0 14px;
    color: var(--brass-bright);
    font-weight: 600;
  }
  .form-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-grid .full{ grid-column: 1 / -1; }
  label{
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #8fa0b3;
    margin-bottom: 5px;
  }
  input[type=text], input[type=date]{
    width: 100%;
    background: #16202c;
    border: 1px solid #3a4c62;
    color: #f4efe2;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 3px;
  }
  input[type=text]:focus, input[type=date]:focus{
    outline: 2px solid var(--brass-bright);
    outline-offset: 1px;
  }
  .checkbox-row{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .checkbox-row input{ width: 16px; height: 16px; }
  .checkbox-row label{ margin: 0; text-transform: none; font-size: 12px; letter-spacing: 0; color: #d8cdb4; }

  button{
    font-family: 'Courier Prime', monospace;
    cursor: pointer;
    border: none;
  }
  .btn-primary{
    margin-top: 14px;
    background: var(--brass);
    color: #1b2733;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: 3px;
  }
  .btn-primary:hover{ background: var(--brass-bright); }

  /* Stack list */
  .stack-toolbar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin: 0 0 14px;
  }
  .stack-label{
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8fa0b3;
    margin: 0;
  }
  .sort-group{
    display: flex;
    gap: 6px;
  }
  .sort-btn{
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 3px;
    background: var(--ink-2);
    color: #8fa0b3;
    border: 1px solid #34455a;
  }
  .sort-btn:hover{ color: var(--card); }
  .sort-btn.active{
    background: var(--brass);
    color: var(--ink);
    border-color: var(--brass);
    font-weight: 700;
  }

  .card{
    background: var(--card);
    color: var(--text-dark);
    border-radius: 3px;
    padding: 16px 18px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
    border-left: 6px solid var(--card-line);
  }
  .card.status-ok{ border-left-color: var(--green-ok); }
  .card.status-soon{ border-left-color: var(--amber); }
  .card.status-final{ border-left-color: var(--red-stamp); }
  .card.is-reading{ box-shadow: 0 0 0 2px var(--brass) inset; }

  .reading-badge{
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 6px;
  }
  .reading-badge::before{ content: '📖'; font-size: 11px; }

  .btn-reading{
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 3px;
    background: transparent;
    color: var(--brass);
    border: 1px solid var(--brass);
  }
  .btn-reading:hover{ background: rgba(176,141,87,0.1); }
  .btn-reading.active{
    background: var(--brass);
    color: var(--ink);
  }

  .card-title{
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 2px;
  }
  .card-author{ font-size: 12px; color: var(--text-muted); margin: 0 0 8px; }
  .meta-line{ font-size: 11.5px; color: var(--text-muted); margin: 2px 0; }
  .stamp{
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    margin-top: 8px;
    border: 1.5px solid currentColor;
    transform: rotate(-2deg);
  }
  .stamp.final{ color: var(--red-stamp); }
  .stamp.renewable{ color: var(--green-ok); }

  .dots{ margin-top: 6px; font-size: 13px; letter-spacing: 3px; }
  .dot-on{ color: var(--brass); }
  .dot-off{ color: var(--card-line); }

  .actions{
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
  }
  .btn-small{
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 3px;
    background: var(--ink);
    color: var(--card);
    white-space: nowrap;
  }
  .btn-small:hover{ background: var(--ink-2); }
  .btn-small:disabled{
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn-remove{
    font-size: 10.5px;
    padding: 6px 10px;
    border-radius: 3px;
    background: transparent;
    color: var(--text-muted);
    border: 1px dashed var(--card-line);
  }
  .btn-remove:hover{ color: var(--red-stamp); border-color: var(--red-stamp); }
  .btn-finish{
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 3px;
    background: var(--green-ok);
    color: #f4efe2;
    border: none;
  }
  .btn-finish:hover{ background: #3d5a44; }

  .renew-inline{
    margin-top: 8px;
    display: none;
    gap: 6px;
  }
  .renew-inline.open{ display: flex; }
  .renew-inline input{ flex: 1; }
  .renew-inline button{
    background: var(--green-ok);
    color: #f4efe2;
    font-size: 11px;
    padding: 8px 10px;
    border-radius: 3px;
  }

  .btn-edit{
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 3px;
    background: transparent;
    color: var(--brass);
    border: 1px solid var(--brass);
  }
  .btn-edit:hover{ background: rgba(176,141,87,0.1); }

  .edit-inline{
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--card-line);
  }
  .edit-inline.open{ display: flex; }
  .edit-inline .edit-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .edit-inline input[type=text],
  .edit-inline input[type=date],
  .edit-inline input[type=number]{
    background: #16202c;
    border: 1px solid #3a4c62;
    color: #f4efe2;
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 3px;
    width: 100%;
  }
  .edit-inline label{
    font-size: 11.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .edit-inline .edit-check-row{
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .edit-inline .edit-check-row input[type=number]{ width: 60px; }
  .edit-inline button{
    background: var(--brass);
    color: var(--ink);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 10px;
    border-radius: 3px;
    align-self: flex-start;
  }
  .edit-inline button:hover{ background: var(--brass-bright); }

  .empty-state{
    text-align: center;
    color: #8fa0b3;
    font-size: 12.5px;
    padding: 30px 10px;
  }

  @media (max-width: 560px){
    .form-grid{ grid-template-columns: 1fr; }
    .card{ grid-template-columns: 1fr; }
    .actions{ flex-direction: row; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">The Stack</p>
    <h1>Library Tracker</h1>
    <p class="sub">What's due, what's renewed, and what to pick up next — synced across your devices.</p>
    <div class="finished-counter" id="finished-counter"></div>
    <div class="calendar-status">
      <button class="btn-calendar" id="calendar-btn" onclick="handleCalendarButtonClick()">Connect Google Calendar</button>
      <span class="calendar-note" id="calendar-note">Due dates will sync automatically once connected.</span>
    </div>
  </header>

  <div id="hero-slot"><div class="empty-hero">Loading your stack…</div></div>

  <p class="reading-shelf-label">Currently reading (up to 5)</p>
  <div id="reading-shelf"></div>

  <div id="return-shelf-wrap"></div>

  <p class="wishlist-label">To read next — from the library</p>
  <div class="quick-add">
    <div class="quick-add-row">
      <input type="text" id="w-title" placeholder="Title">
      <input type="text" id="w-author" placeholder="Author">
      <input type="text" id="w-source" placeholder="Where from (e.g. Wollongong Library)">
      <button onclick="addWishlistBook()">Add</button>
    </div>
  </div>
  <div id="wishlist-list"></div>

  <div class="add-form">
    <h3>Add a book to the stack</h3>
    <div class="form-grid">
      <div class="full">
        <label for="f-title">Title</label>
        <input type="text" id="f-title" placeholder="The Strength of the Few">
      </div>
      <div class="full">
        <label for="f-author">Author</label>
        <input type="text" id="f-author" placeholder="James Islington">
      </div>
      <div>
        <label for="f-borrow">Borrow date</label>
        <input type="date" id="f-borrow">
      </div>
      <div>
        <label for="f-due">Due date</label>
        <input type="date" id="f-due">
      </div>
      <div class="full checkbox-row">
        <input type="checkbox" id="f-renewable" checked>
        <label for="f-renewable">This book can be renewed</label>
      </div>
    </div>
    <button class="btn-primary" onclick="addBook()">Add to stack</button>
  </div>

  <div class="stack-toolbar">
    <p class="stack-label" id="stack-label">Full stack, soonest due first</p>
    <div class="sort-group">
      <button class="sort-btn active" id="sort-due" onclick="setSortMode('due')">Due date</button>
      <button class="sort-btn" id="sort-title" onclick="setSortMode('title')">Title</button>
      <button class="sort-btn" id="sort-author" onclick="setSortMode('author')">Author</button>
    </div>
  </div>
  <div id="book-list"></div>

</div>

<script>
  // ---- Airtable connection ----
  // Scoped Personal Access Token: only has read/write access to this one base.
  const AIRTABLE_TOKEN = 'patUu2M0VkMHUueqM.1ec77f3c51339d204ae18063c993684ba42374d5b01f13adf8a9e8d0b62e9325';
  const BASE_ID = 'appWNX589s5RjfJTI';
  const TABLE_NAME = 'Books';
  const API_URL = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}`;

  let books = [];
  let sortMode = localStorage.getItem('library-tracker-sort') || 'due';
  let dataLoaded = false;

  // ---- Google Calendar connection ----
  const GOOGLE_CLIENT_ID = '525808175865-r0r5ba4hgftlg7s7a7mquhg0dso23doa.apps.googleusercontent.com';
  const CALENDAR_SCOPE = 'https://www.googleapis.com/auth/calendar.events';
  const GCAL_EVENTS_URL = 'https://www.googleapis.com/calendar/v3/calendars/primary/events';

  let googleTokenClient = null;
  let googleAccessToken = null;
  let googleTokenExpiresAt = 0;

  function initGoogleClient(){
    if(!window.google || !window.google.accounts){
      // GIS script hasn't loaded yet — try again shortly.
      setTimeout(initGoogleClient, 300);
      return;
    }
    googleTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: CALENDAR_SCOPE,
      callback: handleGoogleTokenResponse
    });

    // Restore a still-valid token from this browser session, if any.
    try{
      const saved = JSON.parse(sessionStorage.getItem('library-tracker-gcal') || 'null');
      if(saved && saved.expiresAt > Date.now()){
        googleAccessToken = saved.accessToken;
        googleTokenExpiresAt = saved.expiresAt;
      }
    }catch(e){ /* ignore corrupt session data */ }
    updateCalendarButton();
  }

  function handleGoogleTokenResponse(resp){
    if(resp.error){
      console.error('Google auth failed:', resp);
      alert('Could not connect Google Calendar — please try again.');
      return;
    }
    googleAccessToken = resp.access_token;
    googleTokenExpiresAt = Date.now() + (resp.expires_in * 1000);
    sessionStorage.setItem('library-tracker-gcal', JSON.stringify({
      accessToken: googleAccessToken,
      expiresAt: googleTokenExpiresAt
    }));
    updateCalendarButton();
  }

  function isCalendarConnected(){
    return !!googleAccessToken && googleTokenExpiresAt > Date.now();
  }

  function handleCalendarButtonClick(){
    if(isCalendarConnected()){
      if(confirm('Disconnect Google Calendar? Future due dates will stop syncing until you reconnect.')){
        googleAccessToken = null;
        googleTokenExpiresAt = 0;
        sessionStorage.removeItem('library-tracker-gcal');
        updateCalendarButton();
      }
      return;
    }
    googleTokenClient.requestAccessToken({ prompt: 'consent' });
  }

  function updateCalendarButton(){
    const btn = document.getElementById('calendar-btn');
    const note = document.getElementById('calendar-note');
    if(!btn) return;
    if(isCalendarConnected()){
      btn.textContent = 'Calendar connected ✓';
      btn.classList.add('connected');
      note.textContent = 'Due dates are syncing to your primary Google Calendar.';
    }else{
      btn.textContent = 'Connect Google Calendar';
      btn.classList.remove('connected');
      note.textContent = 'Due dates will sync automatically once connected.';
    }
  }

  async function gcalRequest(url, options = {}){
    const res = await fetch(url, {
      ...options,
      headers: {
        'Authorization': `Bearer ${googleAccessToken}`,
        'Content-Type': 'application/json',
        ...(options.headers || {})
      }
    });
    if(!res.ok){
      const errText = await res.text();
      throw new Error(`Calendar error ${res.status}: ${errText}`);
    }
    if(res.status === 204) return null;
    return res.json();
  }

  // All-day event for the due date. Google's all-day "end" date is exclusive,
  // so it needs to be the day after the due date itself.
  function dueDateEventBody(book){
    const start = book.dueDate;
    const endDate = new Date(book.dueDate + 'T00:00:00');
    endDate.setDate(endDate.getDate() + 1);
    const end = endDate.toISOString().split('T')[0];
    return {
      summary: `📚 Due: ${book.title}`,
      description: `${book.author || 'Author unknown'}${book.renewable ? ' — renewable' : ' — final loan, cannot be renewed'}`,
      start: { date: start },
      end: { date: end }
    };
  }

  // Creates or updates the calendar event for a book's due date.
  // Silently no-ops if Calendar isn't connected — never blocks the main save.
  async function syncCalendarEvent(book){
    if(!isCalendarConnected()) return;
    try{
      let eventId = book.calendarEventId;
      if(eventId){
        try{
          await gcalRequest(`${GCAL_EVENTS_URL}/${eventId}`, {
            method: 'PATCH',
            body: JSON.stringify(dueDateEventBody(book))
          });
        }catch(e){
          // Event may have been deleted manually on the calendar side — recreate it.
          eventId = null;
        }
      }
      if(!eventId){
        const created = await gcalRequest(GCAL_EVENTS_URL, {
          method: 'POST',
          body: JSON.stringify(dueDateEventBody(book))
        });
        eventId = created.id;
      }
      if(eventId !== book.calendarEventId){
        book.calendarEventId = eventId;
        await airtableRequest(API_URL, {
          method: 'PATCH',
          body: JSON.stringify({ records: [{ id: book.id, fields: { 'Calendar Event ID': eventId } }] })
        });
      }
    }catch(e){
      console.error('Calendar sync failed:', e);
    }
  }

  // Removes the calendar event tied to a book (finished, returned, or deleted).
  async function removeCalendarEvent(book){
    if(!isCalendarConnected() || !book.calendarEventId) return;
    try{
      await gcalRequest(`${GCAL_EVENTS_URL}/${book.calendarEventId}`, { method: 'DELETE' });
    }catch(e){
      console.error('Calendar cleanup failed:', e);
    }
  }

  async function airtableRequest(url, options = {}){
    const res = await fetch(url, {
      ...options,
      headers: {
        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
        'Content-Type': 'application/json',
        ...(options.headers || {})
      }
    });
    if(!res.ok){
      const errText = await res.text();
      throw new Error(`Airtable error ${res.status}: ${errText}`);
    }
    return res.json();
  }

  function recordToBook(record){
    const f = record.fields || {};
    return {
      id: record.id,
      title: f['Title'] || '',
      author: f['Author'] || '',
      borrowDate: f['Borrow Date'] || '',
      dueDate: f['Due Date'] || '',
      renewable: !!f['Renewable'],
      renewCount: f['Renew Count'] || 0,
      currentlyReading: !!f['Currently Reading'],
      finished: !!f['Finished'],
      finishedDate: f['Finished Date'] || '',
      returned: !!f['Returned'],
      wishlist: !!f['Wishlist'],
      source: f['Source'] || '',
      calendarEventId: f['Calendar Event ID'] || ''
    };
  }

  async function loadData(){
    try{
      let all = [];
      let offset = null;
      do{
        const url = offset ? `${API_URL}?offset=${offset}` : API_URL;
        const data = await airtableRequest(url);
        all = all.concat(data.records);
        offset = data.offset;
      }while(offset);
      books = all.map(recordToBook);
    }catch(e){
      console.error('Load failed:', e);
      document.getElementById('hero-slot').innerHTML =
        '<div class="empty-hero">Could not load your stack — check the connection and reload.</div>';
    }
    dataLoaded = true;
    render();
  }

  function daysUntil(dateStr){
    const today = new Date();
    today.setHours(0,0,0,0);
    const due = new Date(dateStr + 'T00:00:00');
    return Math.round((due - today) / (1000*60*60*24));
  }

  function fmtDate(dateStr){
    if(!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function statusClass(book){
    const d = daysUntil(book.dueDate);
    if(!book.renewable && d <= 3) return 'status-final';
    if(d <= 3) return 'status-soon';
    if(d < 0) return 'status-final';
    return 'status-ok';
  }

  async function addBook(){
    const title = document.getElementById('f-title').value.trim();
    const author = document.getElementById('f-author').value.trim();
    const borrowDate = document.getElementById('f-borrow').value;
    const dueDate = document.getElementById('f-due').value;
    const renewable = document.getElementById('f-renewable').checked;

    if(!title || !dueDate){
      alert('At least a title and a due date are needed to add this to the stack.');
      return;
    }

    const fields = {
      'Title': title,
      'Author': author,
      'Due Date': dueDate,
      'Renewable': renewable,
      'Renew Count': 0,
      'Currently Reading': false,
      'Finished': false,
      'Returned': false
    };
    if(borrowDate) fields['Borrow Date'] = borrowDate;

    try{
      const data = await airtableRequest(API_URL, {
        method: 'POST',
        body: JSON.stringify({ records: [{ fields }] })
      });
      const newBook = recordToBook(data.records[0]);
      books.push(newBook);
      await syncCalendarEvent(newBook);
    }catch(e){
      console.error('Add failed:', e);
      alert('Could not save that book — check your connection and try again.');
      return;
    }

    document.getElementById('f-title').value = '';
    document.getElementById('f-author').value = '';
    document.getElementById('f-borrow').value = '';
    document.getElementById('f-due').value = '';
    document.getElementById('f-renewable').checked = true;
    render();

  function setSortMode(mode){
    sortMode = mode;
    localStorage.setItem('library-tracker-sort', mode);
    render();
  }

  const MAX_CURRENTLY_READING = 5;

  async function toggleCurrentlyReading(id){
    const book = books.find(b => b.id === id);
    const wasReading = book.currentlyReading;

    if(!wasReading){
      const activeCount = books.filter(b => b.currentlyReading).length;
      if(activeCount >= MAX_CURRENTLY_READING){
        alert(`You can only mark up to ${MAX_CURRENTLY_READING} books as currently reading at once. Stop reading one first to swap it out.`);
        return;
      }
    }

    try{
      await airtableRequest(API_URL, {
        method: 'PATCH',
        body: JSON.stringify({ records: [{ id, fields: { 'Currently Reading': !wasReading } }] })
      });
      book.currentlyReading = !wasReading;
    }catch(e){
      console.error('Update failed:', e);
      alert('Could not update that — check your connection and try again.');
      return;
    }
    render();
  }

  function sortBooks(list){
    const copy = [...list];
    if(sortMode === 'title'){
      copy.sort((a,b) => a.title.localeCompare(b.title));
    }else if(sortMode === 'author'){
      copy.sort((a,b) => (a.author||'').localeCompare(b.author||''));
    }else{
      copy.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
    }
    return copy;
  }

  function renderDots(count){
    let out = '';
    for(let i=0; i<3; i++){
      out += i < count ? '<span class="dot-on">●</span>' : '<span class="dot-off">●</span>';
    }
    return out;
  }

  function dueLineFor(book){
    const d = daysUntil(book.dueDate);
    if(d < 0) return `Overdue by ${Math.abs(d)} day${Math.abs(d)===1?'':'s'} — due ${fmtDate(book.dueDate)}`;
    if(d === 0) return `Due today (${fmtDate(book.dueDate)})`;
    return `Due in ${d} day${d===1?'':'s'} — ${fmtDate(book.dueDate)}`;
  }

  function render(){
    if(!dataLoaded) return;
    // Sync sort toolbar buttons
    ['due','title','author'].forEach(m => {
      document.getElementById('sort-' + m).classList.toggle('active', sortMode === m);
    });
    document.getElementById('stack-label').textContent =
      sortMode === 'due' ? 'Full stack, soonest due first' :
      sortMode === 'title' ? 'Full stack, A–Z by title' :
      'Full stack, A–Z by author';

    const activeBooks = books.filter(b => !b.finished && !b.wishlist);
    const wishlistBooks = books.filter(b => b.wishlist);
    const finishedAwaitingReturn = books.filter(b => b.finished && !b.returned);
    const finishedCount = books.filter(b => b.finished).length;

    document.getElementById('finished-counter').textContent =
      finishedCount === 0 ? 'No books finished yet' :
      finishedCount === 1 ? '1 book finished so far' :
      `${finishedCount} books finished so far`;

    const byDue = [...activeBooks].sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
    const heroSlot = document.getElementById('hero-slot');
    const readingBooks = activeBooks.filter(b => b.currentlyReading);

    // Hero: soonest due date among active books not currently being read
    const upcoming = byDue.filter(b => !b.currentlyReading);

    if(activeBooks.length === 0){
      heroSlot.innerHTML = '<div class="empty-hero">The stack is empty. Add the first book below.</div>';
    }else if(upcoming.length === 0){
      heroSlot.innerHTML = '<div class="empty-hero">Everything in the stack is currently being read. Nothing else queued up yet.</div>';
    }else{
      const next = upcoming[0];
      heroSlot.innerHTML = `
        <div class="next-up">
          <div class="tag">Read next</div>
          <h2>${escapeHtml(next.title)}</h2>
          <div class="author">${escapeHtml(next.author || 'Author unknown')}</div>
          <div class="due-line">${dueLineFor(next)}</div>
        </div>
      `;
    }

    // Currently-reading shelf
    const shelfEl = document.getElementById('reading-shelf');
    if(readingBooks.length === 0){
      shelfEl.innerHTML = '<div class="reading-shelf-empty">Nothing marked as currently reading yet — hit "Start reading" on a book below.</div>';
    }else{
      shelfEl.innerHTML = `<div class="reading-shelf">` + readingBooks.map(b => `
        <div class="reading-tile">
          <p class="tile-title">${escapeHtml(b.title)}</p>
          <p class="tile-author">${escapeHtml(b.author || 'Author unknown')}</p>
          <p class="tile-due">${dueLineFor(b)}</p>
          <button class="tile-stop" onclick="toggleCurrentlyReading('${b.id}')">Stop reading</button>
        </div>
      `).join('') + `</div>`;
    }

    // Finished, awaiting return shelf
    const returnWrap = document.getElementById('return-shelf-wrap');
    if(finishedAwaitingReturn.length === 0){
      returnWrap.innerHTML = '';
    }else{
      returnWrap.innerHTML = `
        <p class="return-shelf-label">Finished — waiting to go back to the library</p>
        <div class="return-shelf">
          ${finishedAwaitingReturn.map(b => `
            <div class="return-tile">
              <p class="tile-title">${escapeHtml(b.title)}</p>
              <p class="tile-author">${escapeHtml(b.author || 'Author unknown')}</p>
              <p class="tile-finished">Finished ${fmtDate(b.finishedDate)}</p>
              <button class="tile-returned-btn" onclick="markReturned('${b.id}')">Mark returned</button>
            </div>
          `).join('')}
        </div>
      `;
    }

    // To-read wishlist
    const wishlistEl = document.getElementById('wishlist-list');
    if(wishlistBooks.length === 0){
      wishlistEl.innerHTML = '<div class="wishlist-empty">Nothing on your to-read list yet — jot one down above.</div>';
    }else{
      const today = new Date().toISOString().split('T')[0];
      wishlistEl.innerHTML = wishlistBooks.map(b => `
        <div class="wishlist-row">
          <div class="wishlist-row-top">
            <div>
              <p class="wl-title">${escapeHtml(b.title)}</p>
              <p class="wl-meta">${escapeHtml(b.author || 'Author unknown')}${b.source ? ' · from ' + escapeHtml(b.source) : ''}</p>
            </div>
            <div class="wl-actions">
              <button class="btn-small" onclick="toggleBorrowBox('${b.id}')">I've borrowed this</button>
              <button class="btn-remove" onclick="removeBook('${b.id}')">Remove</button>
            </div>
          </div>
          <div class="borrow-inline" id="borrow-box-${b.id}">
            <input type="date" id="borrow-due-${b.id}" min="${today}">
            <label><input type="checkbox" id="borrow-renewable-${b.id}" checked> Renewable</label>
            <button onclick="confirmBorrowed('${b.id}')">Confirm — I've got it</button>
          </div>
        </div>
      `).join('');
    }

    const sorted = sortBooks(activeBooks);
    const listEl = document.getElementById('book-list');
    if(sorted.length === 0){
      listEl.innerHTML = '<div class="empty-state">No books borrowed yet — nothing to plan around.</div>';
      return;
    }

    listEl.innerHTML = sorted.map(book => {
      const d = daysUntil(book.dueDate);
      const cls = statusClass(book);
      const atLimit = book.renewCount >= 3;
      const canRenew = book.renewable && !atLimit;

      let stampHtml = '';
      if(!book.renewable){
        stampHtml = `<div class="stamp final">Final loan — cannot renew</div>`;
      }else if(atLimit){
        stampHtml = `<div class="stamp final">Max renewals reached</div>`;
      }else{
        stampHtml = `<div class="stamp renewable">Renewable</div>`;
      }

      const today = new Date().toISOString().split('T')[0];
      const readingBadge = book.currentlyReading ? `<div class="reading-badge">Currently reading</div>` : '';

      return `
        <div class="card ${cls} ${book.currentlyReading ? 'is-reading' : ''}">
          <div>
            ${readingBadge}
            <p class="card-title">${escapeHtml(book.title)}</p>
            <p class="card-author">${escapeHtml(book.author || 'Author unknown')}</p>
            <p class="meta-line">Borrowed ${fmtDate(book.borrowDate)} · Due ${fmtDate(book.dueDate)}</p>
            ${stampHtml}
            <div class="dots">${renderDots(book.renewCount)} <span style="font-size:10px; letter-spacing:0; color:var(--text-muted);">&nbsp;renewals used</span></div>

            <div class="renew-inline" id="renew-box-${book.id}">
              <input type="date" id="renew-date-${book.id}" min="${today}">
              <button onclick="confirmRenew('${book.id}')">Confirm renewal</button>
            </div>

            <div class="edit-inline" id="edit-box-${book.id}">
              <div class="edit-row">
                <input type="text" id="edit-title-${book.id}" value="${escapeAttr(book.title)}" placeholder="Title">
                <input type="text" id="edit-author-${book.id}" value="${escapeAttr(book.author)}" placeholder="Author">
              </div>
              <div class="edit-row">
                <input type="date" id="edit-borrow-${book.id}" value="${book.borrowDate}">
                <input type="date" id="edit-due-${book.id}" value="${book.dueDate}">
              </div>
              <div class="edit-check-row">
                <label><input type="checkbox" id="edit-renewable-${book.id}" ${book.renewable ? 'checked' : ''}> Renewable</label>
                <label>Renewals used <input type="number" min="0" max="3" id="edit-renewcount-${book.id}" value="${book.renewCount}"></label>
              </div>
              <button onclick="confirmEdit('${book.id}')">Save changes</button>
            </div>
          </div>
          <div class="actions">
            <button class="btn-reading ${book.currentlyReading ? 'active' : ''}" onclick="toggleCurrentlyReading('${book.id}')">
              ${book.currentlyReading ? 'Reading now' : 'Start reading'}
            </button>
            <button class="btn-small" onclick="toggleRenewBox('${book.id}')" ${canRenew ? '' : 'disabled'}>
              ${atLimit ? 'Renewed 3/3' : (book.renewable ? 'Renew' : 'Not renewable')}
            </button>
            <button class="btn-edit" onclick="toggleEditBox('${book.id}')">Edit</button>
            <button class="btn-finish" onclick="markFinished('${book.id}')">Finished</button>
            <button class="btn-remove" onclick="removeBook('${book.id}')">Remove (added by mistake)</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str){
    return escapeHtml(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  loadData();
  initGoogleClient();
</script>
</body>
</html>
